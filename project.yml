name: CoolifyDeployBar
include:
  - project.local.yml
options:
  bundleIdPrefix: com.julienferla
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  # xcode16_* (objectVersion 77) peut omettre PBXResourcesBuildPhase : le catalogue
  # AppIcon n'est alors pas compilé → pas d'icône app/Dock. xcode15_3 rétablit la phase Resources.
  projectFormat: xcode15_3

settings:
  base:
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "5"

targets:
  CoolifyDeployBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/CoolifyDeployBar
      # XcodeGen 2.45.3 n'ajoute pas toujours PBXResourcesBuildPhase avec `resources:` seul ;
      # forcer le catalogue dans la phase « Copy Bundle Resources » (actool → AppIcon).
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.julienferla.CoolifyDeployBar
        INFOPLIST_FILE: Packaging/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
