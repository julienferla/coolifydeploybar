name: CoolifyDeployBar
options:
  bundleIdPrefix: com.julienferla
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "4"

targets:
  CoolifyDeployBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/CoolifyDeployBar
    resources:
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.julienferla.CoolifyDeployBar
        INFOPLIST_FILE: Packaging/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
