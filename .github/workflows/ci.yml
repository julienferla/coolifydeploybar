name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift build (Debug)
        run: swift build -v

      - name: Swift build (Release)
        run: swift build -c release -v
